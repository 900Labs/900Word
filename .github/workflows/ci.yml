name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt

      - name: Install Linux dependencies for Tauri
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            ripgrep \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install npm dependencies
        run: npm ci

      - name: Frontend check
        run: npm run check

      - name: Frontend lint
        run: npm run lint

      - name: Frontend tests
        run: npm run test

      - name: Frontend build
        run: npm run build

      - name: Bundle size budget
        run: npm run budget:bundle

      - name: Runtime offline scan
        run: npm run smoke:offline

      - name: Package artifact scan
        run: npm run scan:packages

      - name: Generate SBOM
        run: npm run sbom

      - name: Performance smoke
        run: npm run smoke:performance

      - name: Rust format
        run: cargo fmt --all -- --check

      - name: Rust check
        run: cargo check --workspace

      - name: Rust tests
        run: cargo test --workspace

      - name: Rust clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Install cargo security tools
        run: cargo install cargo-audit cargo-deny --locked

      - name: Cargo audit
        run: cargo audit

      - name: Cargo deny
        run: cargo deny check

      - name: npm audit
        run: npm audit --audit-level=high

      - name: Public release source scan
        run: ./scripts/verify-public-release.sh
